<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Lumin Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/chat/styles/theme.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(21 101 192)',
                        background: 'rgb(240 242 245)',
                        info: 'rgb(228 162 69)',
                        card: 'rgb(255 255 255)',
                        muted: 'rgb(236 239 241)',
                        'muted-fg': 'rgb(120 144 156)',
                        border: 'rgba(0 0 0 / 0.08)',
                        input: 'rgb(236 239 241)',
                        destructive: 'rgb(229 57 53)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Roboto', 'sans-serif']
                    },
                    borderRadius: {
                        mobile: '0.625rem',
                        phone: '40px',
                    },
                    boxShadow: {
                        'phone': '0 32px 80px rgba(0, 0, 0, 0.5)',
                    },
                    spacing: {
                        'phone-w': '390px',
                        'phone-h': '844px',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* Prevent iOS zoom on input focus */
        input,
        textarea,
        select,
        button {
            font-size: 16px;
        }

        /* Phone shell container */
        #chat-shell {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            background-color: #f0f2f5;
            border-radius: 0;
            box-shadow: none;
            border: none;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Drawer animations */
        .drawer-overlay {
            position: absolute;
            inset: 0;
            z-index: 40;
            background-color: rgba(0, 0, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms ease;
        }

        .drawer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 224px;
            background-color: white;
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            z-index: 50;
            transition: transform 300ms ease;
            overflow-y: auto;
            padding-top: 0;
        }

        .drawer-left {
            left: 0;
            transform: translateX(-100%);
        }

        .drawer-left.open {
            transform: translateX(0);
        }

        .drawer-right {
            right: 0;
            transform: translateX(100%);
        }

        .drawer-right.open {
            transform: translateX(0);
        }

        .header-icon-btn {
            padding: 0.4rem;
            border-radius: 0.5rem;
            transition: background-color 150ms ease;
        }

        .header-icon-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Message bubble styles */
        .message-bubble {
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            max-width: 280px;
            word-break: break-word;
        }

        .message-mine {
            background-color: var(--primary);
            color: white;
            margin-left: auto;
        }

        .message-theirs {
            background-color: white;
            color: #1a1a2e;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        /* Tab active state */
        .nav-tab.active {
            color: #1565c0;
        }

        /* Message actions */
        .message-actions {
            transition: opacity 200ms ease;
        }

        .message-container:not(:hover) .message-actions {
            opacity: 0;
            pointer-events: none;
        }

        .message-container:hover .message-actions {
            opacity: 1;
            pointer-events: auto;
        }

        /* Vote counts - always visible */
        .vote-counts {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .vote-count {
            font-size: 0.75rem;
            color: #78909c;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            transition: background-color 150ms ease;
            position: relative;
        }

        .vote-count:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .vote-count.zero {
            display: none;
        }

        /* Voter popup */
        .voter-popup {
            position: fixed;
            z-index: 100;
            background-color: white;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 0.625rem;
            padding: 0.75rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            display: none;
            max-width: 160px;
            pointer-events: auto;
        }

        .voter-popup.show {
            display: block;
        }

        .voter-popup-arrow {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: white;
            border: 1px solid rgba(0, 0, 0, 0.12);
            transform: rotate(45deg);
        }

        .voter-popup-title {
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #78909c;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .voter-list {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .voter-name {
            font-size: 0.75rem;
            color: #1a1a2e;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .voter-more {
            font-size: 0.7rem;
            color: #78909c;
            font-style: italic;
            margin-top: 0.25rem;
        }

        /* Touch device support */
        @media (hover: none) {
            .message-container .message-actions {
                opacity: 1;
                pointer-events: auto;
            }

            .message-container.message-tapped .message-actions {
                opacity: 1;
                pointer-events: auto;
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
                opacity: 1;
            }

            50% {
                transform: translateY(-8px);
                opacity: 0.7;
            }
        }

        .animate-bounce {
            animation: bounce 1.4s infinite;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-[#f5f5f5] text-[#1a1a2e] font-sans">
    <div id="chat-shell">
        <!-- Top Bar / Header -->
        <header
            class="flex-shrink-0 bg-primary text-white px-4 py-3 flex items-center justify-between border-b border-primary/20">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <button id="btn-back" class="p-1 hover:bg-white/20 rounded-lg" title="Channels"
                    aria-label="Open channels">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
                <div class="min-w-0">
                    <h1 id="channel-title" class="text-base font-semibold">#general</h1>
                    <p id="status-text" class="text-xs opacity-90">Loading messages...</p>
                </div>
            </div>
            <div class="flex items-center gap-1 ml-2">
                <button id="btn-search" class="header-icon-btn" title="Search" aria-label="Open search">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                            clip-rule="evenodd"></path>
                    </svg>
                </button>
                <button id="btn-profile" class="header-icon-btn" title="Profile" aria-label="Open profile">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                            clip-rule="evenodd"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Messages Container -->
        <div class="flex-1 relative overflow-hidden flex flex-col">
            <div id="messages" class="flex-1 overflow-y-auto space-y-2 p-3 flex flex-col relative"></div>
            <!-- New Messages Badge -->
            <div id="new-messages-badge" class="absolute bottom-3 left-1/2 transform -translate-x-1/2 hidden">
                <button id="jump-to-latest-btn"
                    class="bg-info text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-[#F09E0F] shadow-lg whitespace-nowrap">
                    <span id="new-count">1</span> new message
                </button>
            </div>
        </div>

        <!-- Composer -->
        <form id="composer"
            class="flex-shrink-0 bg-white border-t border-muted px-3 py-2.5 overflow-x-hidden w-full max-w-full">
            <div class="flex items-end gap-2 w-full max-w-full min-w-0">
                <div
                    class="flex-1 bg-muted rounded-2xl px-4 py-2 flex items-end gap-2 min-h-[40px] min-w-0 overflow-hidden">
                    <textarea id="message-input" maxlength="4000" placeholder="Message"
                        class="flex-1 bg-transparent text-base text-[#1a1a2e] placeholder-muted-fg outline-none resize-none leading-relaxed max-h-24 min-w-0"></textarea>
                </div>
                <button type="submit"
                    class="w-9 h-9 rounded-full bg-primary text-white flex items-center justify-center shrink-0 hover:bg-[#0d47a1] flex-shrink-0">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5.951-1.429 5.951 1.429a1 1 0 001.169-1.409l-7-14z">
                        </path>
                    </svg>
                </button>
            </div>
        </form>

        <!-- Drawer Overlay -->
        <div id="drawer-overlay" class="drawer-overlay"></div>

        <!-- Channels Drawer (Left) -->
        <div id="channels-drawer" class="drawer drawer-left">
            <div class="p-4">
                <h2 class="text-sm font-semibold text-[#1a1a2e] mb-3">Channels</h2>
                <div id="channels" class="space-y-1"></div>

                <div class="mt-6 pt-4 border-t border-border">
                    <h3 class="text-xs uppercase tracking-wide text-muted-fg mb-3">Direct Messages</h3>
                    <div id="dms" class="space-y-1"></div>
                </div>

                <div class="mt-6 pt-4 border-t border-border">
                    <button id="btn-logout"
                        class="w-full text-left text-sm px-3 py-2 rounded-xl border border-border hover:border-primary hover:text-primary transition">
                        Log out
                    </button>
                </div>
            </div>
        </div>

        <!-- Search/Sort Drawer (Right) -->
        <div id="search-drawer" class="drawer drawer-right">
            <div class="p-4">
                <h2 class="text-sm font-semibold text-[#1a1a2e] mb-3">Search & Sort</h2>

                <div class="mb-4">
                    <label class="text-xs uppercase tracking-wide text-muted-fg block mb-2">Messages</label>
                    <input id="search-input" type="search" placeholder="Search messages"
                        class="w-full text-sm px-3 py-2 rounded-xl border border-border focus:outline-none focus:ring-2 focus:ring-primary/30">
                </div>

                <div>
                    <label class="text-xs uppercase tracking-wide text-muted-fg block mb-2">Sort By</label>
                    <div class="space-y-2">
                        <button data-sort="date"
                            class="sort-btn w-full text-left text-sm px-3 py-2 rounded-xl border border-border hover:border-primary transition">Chronological</button>
                        <button data-sort="popularity"
                            class="sort-btn w-full text-left text-sm px-3 py-2 rounded-xl border border-border hover:border-primary transition">Popularity</button>
                        <button data-sort="relevance"
                            class="sort-btn w-full text-left text-sm px-3 py-2 rounded-xl border border-border hover:border-primary transition">Relevance</button>
                    </div>
                    <p class="mt-3 text-xs text-muted-fg">Relevance uses full-text search on message content.</p>
                </div>

                <div class="mt-6 pt-4 border-t border-border">
                    <button id="btn-reports"
                        class="w-full text-left text-sm px-3 py-2 rounded-xl border border-border hover:border-primary hover:text-primary transition hidden">
                        Reported Messages
                    </button>
                </div>
            </div>
        </div>

        <!-- Temporary Profile Drawer (Right) -->
        <div id="profile-drawer" class="drawer drawer-right">
            <div class="p-4">
                <h2 class="text-sm font-semibold text-[#1a1a2e] mb-3">Profile</h2>
                <div class="rounded-xl border border-border bg-white p-4">
                    <p class="text-xs uppercase tracking-wide text-muted-fg mb-2">User</p>
                    <p id="profile-user-name" class="text-base font-semibold text-[#1a1a2e]">Loading...</p>
                    <p id="profile-user-handle" class="text-sm text-muted-fg mt-1"></p>
                </div>
                <p class="text-xs text-muted-fg mt-4">Temporary profile page. More account settings coming soon.</p>
            </div>
        </div>
    </div>

    <dialog id="reports-dialog" class="rounded-2xl p-0 backdrop:bg-black/50">
        <div class="bg-white rounded-2xl overflow-hidden max-w-2xl">
            <div class="px-4 py-3 border-b border-border flex items-center justify-between bg-muted">
                <h3 class="font-semibold text-[#1a1a2e]">Reported Messages</h3>
                <button id="close-reports"
                    class="text-sm px-3 py-1.5 rounded-lg border border-border hover:border-primary">Close</button>
            </div>
            <div id="reports-list" class="max-h-[60vh] overflow-y-auto p-4 space-y-3"></div>
        </div>
    </dialog>

    <!-- Voter Popup -->
    <div id="voter-popup" class="voter-popup">
        <!-- <div class="voter-popup-arrow"></div> -->
        <div class="voter-popup-title" id="voter-popup-title">Upvotes</div>
        <div class="voter-list" id="voter-popup-list"></div>
        <div class="voter-more" id="voter-popup-more"></div>
    </div>

    <script>
        const state = {
            token: localStorage.getItem('d11_token') || '',
            user: null,
            channels: [],
            currentChannel: 'general',
            sort: 'date',
            q: '',
            messages: [],
            minMessageId: null,
            maxMessageId: null,
            loadingOlder: false,
            newMessageCount: 0,
            hasNewMessages: false,
            pollTimer: null,
            stickToBottom: true,
            openReplyId: null,
            replyDrafts: {},
            activeDrawer: null,
            aiProcessing: false,
            aiProcessingTimeout: null,
        }

        const el = {
            shell: document.getElementById('chat-shell'),
            channels: document.getElementById('channels'),
            dms: document.getElementById('dms'),
            channelTitle: document.getElementById('channel-title'),
            statusText: document.getElementById('status-text'),
            composer: document.getElementById('composer'),
            messageInput: document.getElementById('message-input'),
            messages: document.getElementById('messages'),
            searchInput: document.getElementById('search-input'),
            sortBtns: Array.from(document.querySelectorAll('.sort-btn')),
            btnLogout: document.getElementById('btn-logout'),
            btnBack: document.getElementById('btn-back'),
            btnSearch: document.getElementById('btn-search'),
            btnProfile: document.getElementById('btn-profile'),
            btnReports: document.getElementById('btn-reports'),
            reportsDialog: document.getElementById('reports-dialog'),
            reportsList: document.getElementById('reports-list'),
            closeReports: document.getElementById('close-reports'),
            channelsDrawer: document.getElementById('channels-drawer'),
            searchDrawer: document.getElementById('search-drawer'),
            profileDrawer: document.getElementById('profile-drawer'),
            profileUserName: document.getElementById('profile-user-name'),
            profileUserHandle: document.getElementById('profile-user-handle'),
            drawerOverlay: document.getElementById('drawer-overlay'),
            voterPopup: document.getElementById('voter-popup'),
            voterPopupTitle: document.getElementById('voter-popup-title'),
            voterPopupList: document.getElementById('voter-popup-list'),
            voterPopupMore: document.getElementById('voter-popup-more'),
            newMessagesBadge: document.getElementById('new-messages-badge'),
            jumpToLatestBtn: document.getElementById('jump-to-latest-btn'),
            newCount: document.getElementById('new-count'),
        }

        function authHeaders() {
            return {
                'Authorization': `Bearer ${state.token}`,
                'Content-Type': 'application/json'
            }
        }

        function esc(text) {
            const div = document.createElement('div')
            div.textContent = text ?? ''
            return div.innerHTML
        }

        async function api(path, options = {}) {
            const res = await fetch(path, {
                ...options,
                headers: {
                    ...(options.headers || {}),
                    ...authHeaders(),
                },
            })

            if (res.status === 401) {
                doLogout()
                return null
            }

            const data = await res.json().catch(() => ({}))
            if (!res.ok) throw new Error(data.error || 'Request failed')
            return data
        }

        function doLogout() {
            localStorage.removeItem('d11_token')
            document.cookie = 'd11_auth=; path=/; SameSite=Lax; Secure; max-age=0'
            location.href = '/'
        }

        function closeDrawer() {
            state.activeDrawer = null
            el.channelsDrawer.classList.remove('open')
            el.searchDrawer.classList.remove('open')
            el.profileDrawer.classList.remove('open')
            el.drawerOverlay.classList.remove('active')
        }

        function openDrawer(drawer) {
            state.activeDrawer = drawer
            el.drawerOverlay.classList.add('active')
            el.btnBack.classList.remove('hidden')

            if (drawer === 'channels') {
                el.channelsDrawer.classList.add('open')
                el.searchDrawer.classList.remove('open')
                el.profileDrawer.classList.remove('open')
            } else if (drawer === 'search') {
                el.searchDrawer.classList.add('open')
                el.channelsDrawer.classList.remove('open')
                el.profileDrawer.classList.remove('open')
            } else if (drawer === 'profile') {
                el.profileDrawer.classList.add('open')
                el.channelsDrawer.classList.remove('open')
                el.searchDrawer.classList.remove('open')
            }
        }

        function applySortButtonStyles() {
            for (const btn of el.sortBtns) {
                const active = btn.dataset.sort === state.sort
                btn.className = `sort-btn w-full text-left text-sm px-3 py-2 rounded-xl border transition ${active ? 'border-primary bg-primary/10 text-primary' : 'border-border'}`
            }
        }

        function renderChannels() {
            el.channels.innerHTML = state.channels.map((ch) => {
                const active = ch.slug === state.currentChannel
                return `<button data-channel="${esc(ch.slug)}" class="w-full text-left px-3 py-2 rounded-xl text-sm transition ${active ? 'bg-primary/10 text-primary font-semibold' : 'hover:bg-muted text-[#1a1a2e]'}"># ${esc(ch.slug)}</button>`
            }).join('')

            for (const btn of el.channels.querySelectorAll('button[data-channel]')) {
                btn.addEventListener('click', () => {
                    state.currentChannel = btn.dataset.channel
                    state.q = ''
                    state.openReplyId = null
                    state.replyDrafts = {}
                    state.minMessageId = null
                    state.maxMessageId = null
                    el.searchInput.value = ''
                    closeDrawer()
                    loadMessages()
                    el.messageInput.focus()
                })
            }

            el.channelTitle.textContent = `#${state.currentChannel}`
        }

        function createAvatarInitials(fullName, slugPrefix) {
            const name = fullName || slugPrefix || 'U'
            const initials = name.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase()
            return initials
        }

        function getAvatarColor(name) {
            const colors = ['#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#ffc107', '#ff9800', '#f44336']
            let hash = 0
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash)
            }
            return colors[Math.abs(hash) % colors.length]
        }

        function linkifyUrls(text) {
            // Regex pattern for URLs starting with http(s)://, www., or common domains
            const urlPattern = /(https?:\/\/[^\s]+|www\.[^\s]+|(?:^|\s)([a-z0-9]+(?:\.[a-z0-9]+)+)(?=\s|$))/gi
            const parts = []
            let lastIndex = 0

            // More comprehensive URL detection
            const httpRegex = /https?:\/\/[^\s<>"\)]+/g
            let match
            while ((match = httpRegex.exec(text)) !== null) {
                // Text before URL
                if (match.index > lastIndex) {
                    parts.push(esc(text.substring(lastIndex, match.index)))
                }
                // URL as clickable link - inherit color from parent
                const url = match[0]
                const displayUrl = url.length > 50 ? url.substring(0, 47) + '...' : url
                parts.push(`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" style="text-decoration: underline; cursor: pointer; opacity: 0.8;">${esc(displayUrl)}</a>`)
                lastIndex = match.index + url.length
            }

            // Remaining text
            if (lastIndex < text.length) {
                parts.push(esc(text.substring(lastIndex)))
            }

            return parts.length > 0 ? parts.join('') : esc(text)
        }

        function showVoterPopup(event, voters, voteType) {
            if (!voters || voters.length === 0) return

            const limited = voters.slice(0, 5)
            const hasMore = voters.length > 5

            el.voterPopupTitle.textContent = voteType === 'up' ? 'Upvotes' : 'Downvotes'
            el.voterPopupList.innerHTML = limited.map((name) => `<div class="voter-name">${esc(name)}</div>`).join('')
            el.voterPopupMore.textContent = hasMore ? `+${voters.length - 5} more` : ''

            const rect = event.target.getBoundingClientRect()
            el.voterPopup.style.top = (rect.bottom + 8) + 'px'
            el.voterPopup.style.left = Math.max(8, rect.left + rect.width / 2 - 80) + 'px'
            el.voterPopup.classList.add('show')

            // Auto-hide after 4 seconds
            clearTimeout(el.voterPopup._hideTimer)
            el.voterPopup._hideTimer = setTimeout(() => {
                el.voterPopup.classList.remove('show')
            }, 4000)
        }

        function hideVoterPopup() {
            el.voterPopup.classList.remove('show')
            clearTimeout(el.voterPopup._hideTimer)
        }

        function updateNewMessagesBadge() {
            if (state.hasNewMessages && state.newMessageCount > 0) {
                el.newCount.textContent = state.newMessageCount
                const plural = state.newMessageCount === 1 ? 'message' : 'messages'
                el.jumpToLatestBtn.textContent = `${state.newMessageCount} new ${plural}`
                el.newMessagesBadge.classList.remove('hidden')
            }
        }

        function hideNewMessagesBadge() {
            el.newMessagesBadge.classList.add('hidden')
            state.hasNewMessages = false
            state.newMessageCount = 0
        }

        function renderReply(reply, parentId) {
            const initials = createAvatarInitials(reply.user_full_name, reply.user_slug_prefix)
            const avatarColor = getAvatarColor(reply.user_slug_prefix || 'unknown')

            return `
                <div class="message-container mt-2 ml-3 pl-3 border-l border-border hover:bg-muted/30 rounded-r-lg p-2 -ml-1 pl-4">
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-6 h-6 rounded-full text-white text-xs font-semibold flex items-center justify-center" style="background-color: ${avatarColor}">${esc(initials)}</div>
                        <span class="text-xs font-medium">${esc(reply.user_full_name || reply.user_slug_prefix)}</span>
                        <span class="text-xs text-muted-fg">${new Date(reply.created_at).toLocaleString([], { year: '2-digit', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                    <div class="text-sm whitespace-pre-wrap text-[#1a1a2e]">${linkifyUrls(reply.content)}</div>
                    <div class="mt-1 flex items-center justify-between gap-2 text-xs text-muted-fg">
                        <div class="vote-counts">
                            ${reply.upvotes > 0 ? `<span class="vote-count" data-vote-type="up" data-voters='${JSON.stringify(reply.upvoters || [])}' title="Click to see upvoters">👍 ${reply.upvotes}</span>` : ''}
                            ${reply.downvotes > 0 ? `<span class="vote-count" data-vote-type="down" data-voters='${JSON.stringify(reply.downvoters || [])}' title="Click to see downvoters">👎 ${reply.downvotes}</span>` : ''}
                        </div>
                        <div class="message-actions flex items-center gap-2 justify-end">
                            <button data-vote="1" data-id="${reply.id}" class="vote-btn px-2 py-1 border rounded-lg border-border hover:border-primary">👍</button>
                            <button data-vote="-1" data-id="${reply.id}" class="vote-btn px-2 py-1 border rounded-lg border-border hover:border-primary">👎</button>
                            <button data-report-id="${reply.id}" class="hidden report-btn px-2 py-1 border rounded-lg border-border hover:border-primary">Report</button>
                            ${state.user?.is_admin === 1 ? `<button data-mod-id="${reply.id}" data-hidden="${reply.is_hidden}" class="hidden mod-btn px-2 py-1 border rounded-lg border-border hover:border-primary">${reply.is_hidden ? 'Unhide' : 'Hide'}</button>` : ''}
                        </div>
                    </div>
                </div>`
        }

        function renderMessages() {
            if (!state.messages.length) {
                el.messages.innerHTML = '<div class="text-sm text-muted-fg text-center py-6">No messages yet. Start the thread.</div>'
                return
            }

            let prevDate = null
            el.messages.innerHTML = state.messages.map((msg) => {
                const msgDate = new Date(msg.created_at)
                const msgDateStr = msgDate.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' })

                let dateSeparator = ''
                if (prevDate !== msgDateStr) {
                    dateSeparator = `<div class="flex items-center gap-3 my-4"><div class="flex-1 h-px bg-border"></div><span class="text-xs font-semibold text-muted-fg px-2">${msgDateStr}</span><div class="flex-1 h-px bg-border"></div></div>`
                    prevDate = msgDateStr
                }

                const initials = createAvatarInitials(msg.user_full_name, msg.user_slug_prefix)
                const avatarColor = getAvatarColor(msg.user_slug_prefix || 'unknown')
                const isOwn = msg.user_slug_prefix === state.user?.slug_prefix

                return `
                    ${dateSeparator}
                    <article class="message-container flex ${isOwn ? 'justify-end' : 'justify-start'} gap-2 mb-3">
                        ${!isOwn ? `<div class="w-8 h-8 rounded-full text-white text-xs font-semibold flex items-center justify-center flex-shrink-0" style="background-color: ${avatarColor}">${esc(initials)}</div>` : ''}
                        <div class="${isOwn ? 'mr-2' : ''}">
                            ${!isOwn ? `<div class="text-xs font-medium text-[#1a1a2e] mb-1">${esc(msg.user_full_name || msg.user_slug_prefix)}</div>` : ''}
                             <div class="text-xs text-muted-fg mt-1 ${isOwn ? 'text-right' : ''}">${msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>

                            <div class="message-bubble ${isOwn ? 'message-mine' : 'message-theirs'}">
                                ${linkifyUrls(msg.content)}
                            </div>
                            <div class="mt-1 flex items-center ${isOwn ? 'justify-end' : 'justify-start'} gap-2 text-xs text-muted-fg flex-wrap">
                                <div class="vote-counts">
                                    ${msg.upvotes > 0 ? `<span class="vote-count" data-vote-type="up" data-voters='${JSON.stringify(msg.upvoters || [])}' title="Click to see upvoters">👍 ${msg.upvotes}</span>` : ''}
                                    ${msg.downvotes > 0 ? `<span class="vote-count" data-vote-type="down" data-voters='${JSON.stringify(msg.downvoters || [])}' title="Click to see downvoters">👎 ${msg.downvotes}</span>` : ''}
                                </div>
                                <div class="message-actions flex items-center gap-2">
                                    <button data-vote="1" data-id="${msg.id}" class="vote-btn px-2 py-1 border rounded-lg border-border hover:border-primary">👍</button>
                                    <button data-vote="-1" data-id="${msg.id}" class="vote-btn px-2 py-1 border rounded-lg border-border hover:border-primary">👎</button>
                                    <button data-reply-open="${msg.id}" class="reply-open-btn px-2 py-1 border rounded-lg border-border hover:border-primary">↩</button>
                                    <button data-report-id="${msg.id}" class="hidden report-btn px-2 py-1 border rounded-lg border-border hover:border-primary">Report</button>
                                    ${state.user?.is_admin === 1 ? `<button data-mod-id="${msg.id}" data-hidden="${msg.is_hidden}" class="hidden mod-btn px-2 py-1 border rounded-lg border-border hover:border-primary">${msg.is_hidden ? 'Unhide' : 'Hide'}</button>` : ''}
                                </div>
                            </div>
                            <form data-reply-form="${msg.id}" class="${state.openReplyId === msg.id ? '' : 'hidden'} mt-3 pt-2 border-t border-border">
                                <textarea data-reply-input="${msg.id}" rows="2" maxlength="4000" class="w-full text-sm px-3 py-2 rounded-xl border border-border resize-none focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="Write a reply...">${esc(state.replyDrafts[msg.id] ?? '')}</textarea>
                                <div class="mt-2 flex justify-end gap-2">
                                    <button type="button" data-reply-cancel="${msg.id}" class="text-xs px-3 py-1.5 rounded-lg border border-border hover:border-primary">Cancel</button>
                                    <button type="submit" class="text-xs px-3 py-1.5 rounded-lg bg-primary text-white hover:bg-[#0d47a1]">Reply</button>
                                </div>
                            </form>
                            ${(msg.replies || []).map((reply) => renderReply(reply, msg.id)).join('')}
                        </div>
                    </article>`
            }).join('')

            // Add AI typing indicator when processing
            if (state.aiProcessing && state.currentChannel === 'ai') {
                el.messages.innerHTML += `
                    <article class="message-container flex justify-start gap-2 mb-3 opacity-60">
                        <div class="w-8 h-8 rounded-full text-white text-xs font-semibold flex items-center justify-center flex-shrink-0" style="background-color: #9c27b0">🤖</div>
                        <div>
                            <div class="text-xs font-medium text-[#1a1a2e] mb-1">AI Assistant</div>
                            <div class="message-bubble message-theirs">
                                <div class="flex gap-1">
                                    <div class="w-2 h-2 rounded-full bg-muted-fg animate-bounce" style="animation-delay: 0s"></div>
                                    <div class="w-2 h-2 rounded-full bg-muted-fg animate-bounce" style="animation-delay: 0.2s"></div>
                                    <div class="w-2 h-2 rounded-full bg-muted-fg animate-bounce" style="animation-delay: 0.4s"></div>
                                </div>
                            </div>
                        </div>
                    </article>`
            }

            wireMessageActions()
        }

        function scrollMessagesToBottom(force = false) {
            if (!force && !state.stickToBottom) return
            requestAnimationFrame(() => {
                el.messages.scrollTop = Math.max(el.messages.scrollHeight - el.messages.clientHeight, 0)
            })
        }

        function wireMessageActions() {
            // Wire vote count popups
            for (const span of el.messages.querySelectorAll('.vote-count')) {
                span.addEventListener('click', (e) => {
                    e.stopPropagation()
                    try {
                        const voters = JSON.parse(span.dataset.voters || '[]')
                        const voteType = span.dataset.voteType
                        showVoterPopup(e, voters, voteType)
                    } catch (err) {
                        console.error('Error parsing voters:', err)
                    }
                })

                span.addEventListener('mouseenter', (e) => {
                    try {
                        const voters = JSON.parse(span.dataset.voters || '[]')
                        if (voters.length > 0) {
                            const voteType = span.dataset.voteType
                            showVoterPopup(e, voters, voteType)
                        }
                    } catch (err) {
                        console.error('Error parsing voters:', err)
                    }
                })

                span.addEventListener('mouseleave', () => {
                    clearTimeout(el.voterPopup._hideTimer)
                    el.voterPopup._hideTimer = setTimeout(() => hideVoterPopup(), 200)
                })
            }

            el.voterPopup.addEventListener('mouseenter', () => {
                clearTimeout(el.voterPopup._hideTimer)
            })

            el.voterPopup.addEventListener('mouseleave', hideVoterPopup)

            for (const btn of el.messages.querySelectorAll('.vote-btn')) {
                btn.addEventListener('click', async () => {
                    const id = Number(btn.dataset.id)
                    const vote = Number(btn.dataset.vote)
                    await api(`/api/chat/messages/${id}/vote`, {
                        method: 'POST',
                        body: JSON.stringify({ vote })
                    })
                    await loadMessages({ silent: true })
                })
            }

            for (const btn of el.messages.querySelectorAll('.report-btn')) {
                btn.addEventListener('click', async () => {
                    const id = Number(btn.dataset.reportId)
                    await api(`/api/chat/messages/${id}/report`, { method: 'POST' })
                    btn.textContent = 'Reported'
                    btn.disabled = true
                })
            }

            for (const btn of el.messages.querySelectorAll('.reply-open-btn')) {
                btn.addEventListener('click', () => {
                    const id = Number(btn.dataset.replyOpen)
                    state.openReplyId = id
                    renderMessages()
                    const input = el.messages.querySelector(`[data-reply-input="${id}"]`)
                    if (input) input.focus()
                })
            }

            for (const btn of el.messages.querySelectorAll('[data-reply-cancel]')) {
                btn.addEventListener('click', () => {
                    const id = Number(btn.dataset.replyCancel)
                    state.openReplyId = null
                    delete state.replyDrafts[id]
                    renderMessages()
                })
            }

            for (const input of el.messages.querySelectorAll('[data-reply-input]')) {
                input.addEventListener('input', () => {
                    const id = Number(input.dataset.replyInput)
                    state.replyDrafts[id] = input.value
                })

                input.addEventListener('keydown', (event) => {
                    if (event.key !== 'Enter' || event.shiftKey) return
                    event.preventDefault()
                    const form = input.closest('form')
                    if (form) form.requestSubmit()
                })
            }

            for (const form of el.messages.querySelectorAll('[data-reply-form]')) {
                form.addEventListener('submit', async (event) => {
                    event.preventDefault()
                    const id = Number(form.dataset.replyForm)
                    const input = el.messages.querySelector(`[data-reply-input="${id}"]`)
                    const content = input.value.trim()
                    if (!content) return

                    await api('/api/chat/messages', {
                        method: 'POST',
                        body: JSON.stringify({
                            channel_slug: state.currentChannel,
                            parent_id: id,
                            content,
                        }),
                    })

                    input.value = ''
                    delete state.replyDrafts[id]
                    state.openReplyId = null
                    await loadMessages({ silent: true })
                })
            }

            for (const btn of el.messages.querySelectorAll('.mod-btn')) {
                btn.addEventListener('click', async () => {
                    const id = Number(btn.dataset.modId)
                    const hidden = btn.dataset.hidden === 'true'
                    await api(`/api/chat/messages/${id}/moderate`, {
                        method: 'PATCH',
                        body: JSON.stringify({ is_hidden: !hidden }),
                    })
                    await loadMessages({ silent: true })
                })
            }
        }

        async function loadChannels() {
            const res = await api('/api/chat/channels')
            if (!res) return
            state.channels = res.data || []
            if (!state.channels.some((c) => c.slug === state.currentChannel) && state.channels[0]) {
                state.currentChannel = state.channels[0].slug
            }
            renderChannels()
        }

        async function loadMessages({ silent = false, forceScrollBottom = false, loadOlder = false } = {}) {
            if (loadOlder && state.loadingOlder) return
            if (loadOlder) state.loadingOlder = true

            const activeReplyInput = document.activeElement?.matches?.('[data-reply-input]')
                ? document.activeElement
                : null
            const focusReplyId = activeReplyInput ? Number(activeReplyInput.dataset.replyInput) : null
            const focusSelectionStart = activeReplyInput ? activeReplyInput.selectionStart : null
            const focusSelectionEnd = activeReplyInput ? activeReplyInput.selectionEnd : null

            if (!silent) el.statusText.textContent = 'Loading...'
            const params = new URLSearchParams({
                channel: state.currentChannel,
                sort: state.sort,
            })
            if (state.q) params.set('q', state.q)
            if (loadOlder && state.minMessageId) {
                params.set('before_id', state.minMessageId.toString())
            }

            const res = await api(`/api/chat/messages?${params.toString()}`)
            if (!res) {
                state.loadingOlder = false
                return
            }

            if (loadOlder) {
                const newOlderMessages = res.data || []
                if (newOlderMessages.length === 0) {
                    // No more older messages — don't modify scroll at all
                    state.loadingOlder = false
                    return
                }
                // Prepend older messages
                state.messages = [...newOlderMessages, ...state.messages]
                const oldScrollHeight = el.messages.scrollHeight
                // Wait for DOM to update
                await new Promise((resolve) => requestAnimationFrame(resolve))
                // Maintain scroll position relative to new content
                el.messages.scrollTop = el.messages.scrollHeight - oldScrollHeight
            } else {
                // For polling: if user is scrolled back, show badge instead of jumping
                if (!state.stickToBottom && !forceScrollBottom && state.messages.length > 0) {
                    // Count new messages (those with ID > maxMessageId)
                    const newMessages = (res.data || []).filter((m) => !state.messages.some((existing) => existing.id === m.id))
                    if (newMessages.length > 0) {
                        state.newMessageCount = newMessages.length
                        state.hasNewMessages = true
                        updateNewMessagesBadge()
                    }
                    state.loadingOlder = false
                    el.statusText.textContent = `${res.meta.total || 0} messages`
                    return // Don't update messages yet, just show badge
                }

                // Initial load or refresh - replace all messages
                state.messages = res.data || []
                if (state.openReplyId !== null && !state.messages.some((m) => m.id === state.openReplyId)) {
                    state.openReplyId = null
                }
            }

            // Track message ID bounds
            if (state.messages.length > 0) {
                const ids = state.messages.map((m) => m.id).filter((id) => typeof id === 'number')
                state.minMessageId = Math.min(...ids)
                state.maxMessageId = Math.max(...ids)
            }

            renderChannels()

            // Detect when AI response appears and clear processing flag
            if (state.aiProcessing && state.currentChannel === 'ai' && state.messages.length > 0) {
                const lastMsg = state.messages[state.messages.length - 1]
                if (lastMsg && lastMsg.replies && lastMsg.replies.length > 0) {
                    // AI response detected - stop processing
                    state.aiProcessing = false
                    clearTimeout(state.aiProcessingTimeout)
                }
            }

            renderMessages()

            if (focusReplyId !== null) {
                const restored = el.messages.querySelector(`[data-reply-input="${focusReplyId}"]`)
                if (restored) {
                    restored.focus()
                    if (focusSelectionStart !== null && focusSelectionEnd !== null) {
                        restored.setSelectionRange(focusSelectionStart, focusSelectionEnd)
                    }
                }
            }

            if (!loadOlder) {
                scrollMessagesToBottom(forceScrollBottom)
            }
            el.statusText.textContent = `${res.meta.total || 0} messages`
            state.loadingOlder = false
        }

        async function postMessage(content) {
            const tempId = `temp-${Date.now()}`
            const optimistic = {
                id: tempId,
                user_full_name: state.user?.full_name,
                user_slug_prefix: state.user?.slug_prefix || 'you',
                created_at: new Date().toISOString(),
                content,
                upvotes: 0,
                downvotes: 0,
                is_hidden: 0,
                replies: [],
            }

            state.messages = [...state.messages, optimistic]
            renderMessages()
            scrollMessagesToBottom(true)

            // Activate AI processing mode for #ai channel
            if (state.currentChannel === 'ai') {
                state.aiProcessing = true
                // Auto-clear after 60 seconds as a timeout
                clearTimeout(state.aiProcessingTimeout)
                state.aiProcessingTimeout = setTimeout(() => {
                    state.aiProcessing = false
                    renderMessages()
                }, 60000)
            }

            try {
                await api('/api/chat/messages', {
                    method: 'POST',
                    body: JSON.stringify({
                        channel_slug: state.currentChannel,
                        content,
                    }),
                })
                await loadMessages({ silent: true, forceScrollBottom: true })
            } catch (err) {
                state.messages = state.messages.filter((m) => m.id !== tempId)
                state.aiProcessing = false
                clearTimeout(state.aiProcessingTimeout)
                renderMessages()
                alert(err.message)
            }
        }

        async function loadReports() {
            const res = await api('/api/chat/reports')
            if (!res) return

            el.reportsList.innerHTML = (res.data || []).map((msg) => `
                <article class="border border-border rounded-xl p-3">
                    <div class="text-xs text-muted-fg mb-1">#${esc(msg.channel_slug)} · ${esc(msg.user_full_name || msg.user_slug_prefix)} · ${new Date(msg.created_at).toLocaleString()}</div>
                    <div class="text-sm whitespace-pre-wrap mb-2">${linkifyUrls(msg.content)}</div>
                    <div class="flex gap-2">
                        <button data-mod-id="${msg.id}" data-hidden="${msg.is_hidden}" class="reports-mod-btn text-xs px-3 py-1.5 rounded-lg border border-border hover:border-primary">${msg.is_hidden ? 'Unhide' : 'Hide'}</button>
                    </div>
                </article>
            `).join('') || '<p class="text-sm text-muted-fg">No reported messages.</p>'

            for (const btn of el.reportsList.querySelectorAll('.reports-mod-btn')) {
                btn.addEventListener('click', async () => {
                    const id = Number(btn.dataset.modId)
                    const hidden = btn.dataset.hidden === 'true'
                    await api(`/api/chat/messages/${id}/moderate`, {
                        method: 'PATCH',
                        body: JSON.stringify({ is_hidden: !hidden }),
                    })
                    await loadReports()
                    await loadMessages({ silent: true })
                })
            }
        }

        async function bootstrap() {
            if (!state.token) {
                location.href = '/'
                return
            }

            try {
                const me = await api('/api/auth/me', { method: 'GET' })
                if (!me) return
                state.user = me
                if (state.user.is_admin === 1) {
                    el.btnReports.classList.remove('hidden')
                }
                el.profileUserName.textContent = state.user.full_name || state.user.slug_prefix || 'User'
                el.profileUserHandle.textContent = state.user.slug_prefix ? `@${state.user.slug_prefix}` : ''

                const fromQuery = new URLSearchParams(location.search).get('channel')
                if (fromQuery) state.currentChannel = fromQuery

                applySortButtonStyles()
                await loadChannels()
                await loadMessages({ forceScrollBottom: true })
                el.messageInput.focus()

                // Smart polling: faster when AI is processing
                const startPolling = () => {
                    if (state.pollTimer) clearInterval(state.pollTimer)
                    const interval = state.aiProcessing ? 2000 : 10000
                    state.pollTimer = setInterval(() => {
                        loadMessages({ silent: true }).catch(() => null)
                        // Re-evaluate polling speed
                        startPolling()
                    }, interval)
                }
                startPolling()
            } catch {
                doLogout()
            }
        }

        el.composer.addEventListener('submit', async (event) => {
            event.preventDefault()
            const content = el.messageInput.value.trim()
            if (!content) return
            el.messageInput.value = ''
            el.messageInput.style.height = 'auto'
            await postMessage(content)
        })

        el.messageInput.addEventListener('keydown', async (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault()
                const content = el.messageInput.value.trim()
                if (!content) return
                el.messageInput.value = ''
                el.messageInput.style.height = 'auto'
                await postMessage(content)
            }
        })

        el.messageInput.addEventListener('input', () => {
            el.messageInput.style.height = 'auto'
            el.messageInput.style.height = Math.min(el.messageInput.scrollHeight, 96) + 'px'
        })

        el.searchInput.addEventListener('keydown', async (event) => {
            if (event.key === 'Enter') {
                event.preventDefault()
                state.q = el.searchInput.value.trim()
                state.minMessageId = null
                state.maxMessageId = null
                await loadMessages({ forceScrollBottom: true })
            }
        })

        el.searchInput.addEventListener('input', async () => {
            const next = el.searchInput.value.trim()
            if (next !== '') return
            if (state.q === '') return
            state.q = ''
            await loadMessages({ forceScrollBottom: true })
        })

        for (const btn of el.sortBtns) {
            btn.addEventListener('click', async () => {
                state.sort = btn.dataset.sort || 'date'
                applySortButtonStyles()
                await loadMessages()
            })
        }

        el.btnLogout.addEventListener('click', doLogout)
        el.btnBack.addEventListener('click', () => {
            if (state.activeDrawer === 'channels') {
                closeDrawer()
                return
            }
            openDrawer('channels')
        })
        el.btnSearch.addEventListener('click', () => {
            if (state.activeDrawer === 'search') {
                closeDrawer()
            } else {
                openDrawer('search')
            }
        })
        el.btnProfile.addEventListener('click', () => {
            if (state.activeDrawer === 'profile') {
                closeDrawer()
            } else {
                openDrawer('profile')
            }
        })
        el.drawerOverlay.addEventListener('click', closeDrawer)

        // Jump to latest messages button
        el.jumpToLatestBtn.addEventListener('click', async () => {
            hideNewMessagesBadge()
            state.messages = []
            state.minMessageId = null
            state.maxMessageId = null
            await loadMessages({ silent: true, forceScrollBottom: true })
        })

        el.btnReports.addEventListener('click', async () => {
            await loadReports()
            el.reportsDialog.showModal()
        })
        el.closeReports.addEventListener('click', () => el.reportsDialog.close())

        el.messages.addEventListener('scroll', () => {
            const distanceToBottom = el.messages.scrollHeight - el.messages.scrollTop - el.messages.clientHeight
            state.stickToBottom = distanceToBottom < 32

            // Hide badge when user scrolls back to bottom
            if (state.stickToBottom && state.hasNewMessages) {
                hideNewMessagesBadge()
            }

            // Load older messages when user scrolls near top
            const distanceToTop = el.messages.scrollTop
            if (distanceToTop < 256 && !state.loadingOlder && state.messages.length > 0) {
                loadMessages({ silent: true, loadOlder: true })
            }
        })

        // Close voter popup when clicking elsewhere
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.vote-count') && !e.target.closest('.voter-popup')) {
                hideVoterPopup()
            }
        })

        bootstrap()
    </script>
</body>

</html>

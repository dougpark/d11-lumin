<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive - Lumin</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        g: { blue: '#4285F4', black: '#1F1F1F', gray: '#474747', border: '#E3E3E3', surface: '#FFFFFF' }
                    },
                    fontFamily: { sans: ['Inter', 'Roboto', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/vendor/suite-menu.js"></script>
    <style>
        .dropzone.drag-over {
            border-color: #4285F4;
            background: #EFF6FF;
        }

        .spinner {
            border: 2px solid #E3E3E3;
            border-top-color: #4285F4;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-[#F0F2F5] font-sans text-g-black antialiased min-h-screen">
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-g-border">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center gap-3">
            <a href="/" class="flex-shrink-0">
                <img src="/lumin_navbar_650.jpeg" alt="Lumin" class="h-8 w-auto">
            </a>
            <div class="min-w-0 flex-1">
                <h1 class="text-base font-semibold text-g-black leading-tight truncate">Lumin Drive</h1>
                <p id="header-user-name" class="text-xs text-g-gray truncate">Loading user...</p>
            </div>
            <div class="relative flex-shrink-0">
                <button id="btn-suite-menu"
                    class="p-2 rounded-full text-g-gray hover:text-g-blue hover:bg-blue-50 transition-colors"
                    aria-label="Open suite navigation" title="Suite navigation" aria-expanded="false">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                </button>
                <div id="suite-menu"
                    class="hidden absolute right-0 top-10 bg-white border border-g-border rounded-[12px] shadow-lg w-56 p-2 z-50">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-6">
            <aside class="bg-white border border-g-border rounded-[16px] p-4 h-fit">
                <p class="text-xs uppercase tracking-wide text-g-gray mb-3">Drive Views</p>
                <button id="btn-view-root"
                    class="w-full text-left rounded-[10px] px-3 py-2 text-sm font-medium bg-blue-50 text-g-blue">My
                    Drive</button>
                <button id="btn-view-attachments"
                    class="mt-2 w-full text-left rounded-[10px] px-3 py-2 text-sm text-g-gray hover:bg-[#F8F9FA]">Attachments</button>
                <div class="mt-5 border-t border-g-border pt-4">
                    <label for="search-input" class="text-xs uppercase tracking-wide text-g-gray">Search</label>
                    <input id="search-input" type="text" placeholder="Find files or folders"
                        class="mt-2 w-full text-sm border border-g-border rounded-[10px] px-3 py-2 outline-none focus:ring-2 focus:ring-g-blue/20 focus:border-g-blue">
                </div>
                <p id="status-msg" class="mt-4 text-xs text-g-gray"></p>
            </aside>

            <section class="space-y-4">
                <div class="bg-white border border-g-border rounded-[16px] p-4">
                    <div class="flex flex-wrap gap-2 items-center justify-between">
                        <div>
                            <h2 class="text-sm font-semibold text-g-black">Current Location</h2>
                            <p id="crumbs" class="text-xs text-g-gray mt-1">/ My Drive</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-2">
                            <button id="btn-new-folder"
                                class="text-sm border border-g-border rounded-[10px] px-3 py-2 hover:bg-[#F8F9FA]">New
                                Folder</button>
                            <button id="btn-upload"
                                class="text-sm bg-g-blue text-white rounded-[10px] px-3 py-2 hover:bg-blue-600">Upload</button>
                            <input id="file-input" type="file" class="hidden" multiple>
                        </div>
                    </div>
                    <div id="dropzone"
                        class="dropzone mt-4 rounded-[12px] border border-dashed border-g-border bg-[#FAFAFA] px-4 py-6 text-center text-sm text-g-gray">
                        Drag and drop files here, or paste images while this page is focused.
                    </div>
                    <div id="upload-progress" class="mt-3 space-y-2"></div>
                </div>

                <div class="bg-white border border-g-border rounded-[16px] overflow-hidden">
                    <div class="px-4 py-3 border-b border-g-border flex items-center justify-between">
                        <h3 class="text-sm font-semibold">Items</h3>
                        <div id="loading" class="hidden flex items-center gap-2 text-xs text-g-gray">
                            <div class="spinner"></div>
                            Loading...
                        </div>
                    </div>
                    <div id="items-list" class="divide-y divide-g-border"></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        function qs(sel) { return document.querySelector(sel) }
        function esc(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
        }

        const state = {
            token: '',
            user: null,
            mode: 'drive',
            parentId: null,
            crumbs: ['/ My Drive'],
            items: [],
            loading: false,
            uploadQueue: [],
        }

        function setStatus(message, tone = 'muted') {
            const el = qs('#status-msg')
            if (!el) return
            el.textContent = message
            el.classList.remove('text-g-gray', 'text-red-500', 'text-green-700')
            if (tone === 'error') el.classList.add('text-red-500')
            else if (tone === 'success') el.classList.add('text-green-700')
            else el.classList.add('text-g-gray')
        }

        function setLoading(loading) {
            state.loading = Boolean(loading)
            qs('#loading').classList.toggle('hidden', !state.loading)
        }

        async function api(path, options = {}) {
            const res = await fetch(path, {
                ...options,
                headers: {
                    ...(options.headers || {}),
                    Authorization: `Bearer ${state.token}`,
                },
            })

            let payload = {}
            try { payload = await res.json() } catch { /* ignore */ }

            if (res.status === 401) {
                localStorage.removeItem('d11_token')
                location.href = '/'
                throw new Error('Unauthorized')
            }
            if (!res.ok) throw new Error(payload.error || 'Request failed')
            return payload
        }

        function renderUploadQueue() {
            const host = qs('#upload-progress')
            if (!state.uploadQueue.length) {
                host.innerHTML = ''
                return
            }
            host.innerHTML = state.uploadQueue.map((item) => {
                const pct = Math.max(0, Math.min(100, Math.round(item.progress)))
                return `
                    <div class="rounded-lg border border-g-border bg-white px-3 py-2">
                        <div class="flex items-center justify-between gap-2">
                            <p class="text-xs text-g-black truncate">${esc(item.name)}</p>
                            <span class="text-[11px] text-g-gray">${esc(item.status)}</span>
                        </div>
                        <div class="mt-1 h-1.5 bg-[#EEF2F7] rounded-full overflow-hidden">
                            <div class="h-full bg-g-blue" style="width:${pct}%"></div>
                        </div>
                    </div>
                `
            }).join('')
        }

        function currentParentParam() {
            if (state.mode === 'attachments') return 'attachments'
            return state.parentId === null ? 'root' : String(state.parentId)
        }

        function renderCrumbs() {
            qs('#crumbs').textContent = state.crumbs.join(' / ')
        }

        function formatBytes(bytes) {
            const num = Number(bytes || 0)
            if (!num) return '0 B'
            const units = ['B', 'KB', 'MB', 'GB']
            let value = num
            let idx = 0
            while (value >= 1024 && idx < units.length - 1) {
                value /= 1024
                idx += 1
            }
            return `${value.toFixed(value >= 10 ? 0 : 1)} ${units[idx]}`
        }

        async function downloadDriveItem(id) {
            const res = await api(`/api/drive/items/${id}/download`)
            if (!res?.data?.url) throw new Error('Download URL unavailable')
            const a = document.createElement('a')
            a.href = res.data.url
            a.download = res.data.filename || 'download'
            document.body.appendChild(a)
            a.click()
            a.remove()
        }

        function itemActions(item) {
            if (item.kind === 'folder') {
                return `
                    <button data-open="${item.drive_item_id}" class="text-xs text-g-blue hover:underline">Open</button>
                    <button data-rename="${item.drive_item_id}" class="text-xs text-g-gray hover:text-g-blue">Rename</button>
                    <button data-delete="${item.drive_item_id}" class="text-xs text-red-500 hover:underline">Delete</button>
                `
            }

            if (item.source === 'attachment') {
                return item.drive_item_id
                    ? `<span class="text-xs text-green-700">Linked in Drive</span>`
                    : '<span class="text-xs text-g-gray">Attachment shelf</span>'
            }

            return `
                <button data-download="${item.drive_item_id}" class="text-xs text-g-blue hover:underline">Download</button>
                <button data-rename="${item.drive_item_id}" class="text-xs text-g-gray hover:text-g-blue">Rename</button>
                <button data-delete="${item.drive_item_id}" class="text-xs text-red-500 hover:underline">Delete</button>
            `
        }

        function renderItems() {
            const host = qs('#items-list')
            if (!state.items.length) {
                host.innerHTML = '<p class="px-4 py-8 text-sm text-g-gray">No items in this location yet.</p>'
                return
            }

            host.innerHTML = state.items.map((item) => {
                const isFolder = item.kind === 'folder'
                const icon = isFolder
                    ? '<span class="text-base">📁</span>'
                    : '<span class="text-base">📄</span>'
                const detail = isFolder
                    ? 'Folder'
                    : `${esc(item.content_type || 'application/octet-stream')} • ${formatBytes(item.size)}`
                return `
                    <div class="px-4 py-3 flex items-center justify-between gap-3">
                        <div class="min-w-0 flex items-center gap-3">
                            ${icon}
                            <div class="min-w-0">
                                <p class="text-sm font-medium text-g-black truncate">${esc(item.display_name)}</p>
                                <p class="text-xs text-g-gray truncate">${detail}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">${itemActions(item)}</div>
                    </div>
                `
            }).join('')
        }

        async function loadItems() {
            setLoading(true)
            try {
                const parent = currentParentParam()
                const res = await api(`/api/drive/tree?parent_id=${encodeURIComponent(parent)}`)
                state.items = Array.isArray(res.data) ? res.data : []
                renderItems()
                renderCrumbs()
            } catch (err) {
                setStatus(err.message || 'Failed to load drive items', 'error')
            } finally {
                setLoading(false)
            }
        }

        async function createFolder() {
            const name = prompt('Folder name')
            if (!name) return
            try {
                await api('/api/drive/folders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_name: name, parent_id: state.parentId }),
                })
                setStatus('Folder created', 'success')
                await loadItems()
            } catch (err) {
                setStatus(err.message || 'Failed to create folder', 'error')
            }
        }

        async function renameItem(itemId) {
            const current = state.items.find((item) => item.drive_item_id === itemId)
            const nextName = prompt('New name', current?.display_name || '')
            if (!nextName) return
            try {
                await api(`/api/drive/items/${itemId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_name: nextName }),
                })
                setStatus('Item renamed', 'success')
                await loadItems()
            } catch (err) {
                setStatus(err.message || 'Rename failed', 'error')
            }
        }

        async function deleteItem(itemId) {
            if (!confirm('Soft delete this item from Drive?')) return
            try {
                await api(`/api/drive/items/${itemId}`, { method: 'DELETE' })
                setStatus('Item deleted from Drive', 'success')
                await loadItems()
            } catch (err) {
                setStatus(err.message || 'Delete failed', 'error')
            }
        }

        async function runSearch() {
            const q = qs('#search-input').value.trim()
            if (!q) {
                await loadItems()
                return
            }

            setLoading(true)
            try {
                const res = await api(`/api/drive/search?q=${encodeURIComponent(q)}`)
                state.items = Array.isArray(res.data) ? res.data : []
                state.crumbs = ['/ Search', q]
                renderItems()
                renderCrumbs()
            } catch (err) {
                setStatus(err.message || 'Search failed', 'error')
            } finally {
                setLoading(false)
            }
        }

        async function uploadFiles(files) {
            if (!files || !files.length) return

            for (const file of files) {
                const uploadItem = {
                    id: `${Date.now()}-${Math.random()}`,
                    name: file.name,
                    progress: 0,
                    status: 'Uploading...'
                }
                state.uploadQueue = [...state.uploadQueue, uploadItem]
                renderUploadQueue()

                try {
                    await new Promise((resolve, reject) => {
                        const form = new FormData()
                        form.set('file', file)
                        form.set('parent_id', currentParentParam())
                        form.set('fileLastModified', String(file.lastModified || ''))

                        const xhr = new XMLHttpRequest()
                        xhr.open('POST', '/api/drive/files')
                        xhr.setRequestHeader('Authorization', `Bearer ${state.token}`)

                        xhr.upload.onprogress = (event) => {
                            if (!event.lengthComputable) return
                            uploadItem.progress = (event.loaded / event.total) * 100
                            renderUploadQueue()
                        }

                        xhr.onerror = () => reject(new Error('Upload failed'))
                        xhr.onload = () => {
                            let payload = {}
                            try { payload = JSON.parse(xhr.responseText || '{}') } catch { }
                            if (xhr.status >= 200 && xhr.status < 300) resolve(payload)
                            else reject(new Error(payload.error || 'Upload failed'))
                        }
                        xhr.send(form)
                    })

                    uploadItem.progress = 100
                    uploadItem.status = 'Done'
                } catch (err) {
                    uploadItem.status = 'Failed'
                    setStatus(err.message || 'Upload failed', 'error')
                }

                renderUploadQueue()
            }

            setTimeout(() => {
                state.uploadQueue = state.uploadQueue.filter((item) => item.status === 'Uploading...')
                renderUploadQueue()
            }, 1000)

            await loadItems()
        }

        function pastedImageFiles(event) {
            const data = event.clipboardData
            if (!data?.items?.length) return []
            const files = []
            for (const item of data.items) {
                if (item.kind !== 'file') continue
                if (!item.type || !item.type.startsWith('image/')) continue
                const file = item.getAsFile()
                if (file) files.push(file)
            }
            return files
        }

        function bindEvents() {
            qs('#btn-view-root').addEventListener('click', async () => {
                state.mode = 'drive'
                state.parentId = null
                state.crumbs = ['/ My Drive']
                await loadItems()
            })

            qs('#btn-view-attachments').addEventListener('click', async () => {
                state.mode = 'attachments'
                state.parentId = null
                state.crumbs = ['/ Attachments']
                await loadItems()
            })

            qs('#btn-new-folder').addEventListener('click', () => {
                if (state.mode === 'attachments') {
                    setStatus('Attachments view is read-only', 'error')
                    return
                }
                createFolder()
            })

            qs('#btn-upload').addEventListener('click', () => {
                qs('#file-input').click()
            })

            qs('#file-input').addEventListener('change', (event) => {
                const files = event.target?.files
                uploadFiles(files).catch(() => null)
                event.target.value = ''
            })

            qs('#search-input').addEventListener('keydown', (event) => {
                if (event.key === 'Enter') runSearch().catch(() => null)
            })

            const dropzone = qs('#dropzone')
                ;['dragenter', 'dragover'].forEach((name) => {
                    dropzone.addEventListener(name, (event) => {
                        event.preventDefault()
                        dropzone.classList.add('drag-over')
                    })
                })
                ;['dragleave', 'drop'].forEach((name) => {
                    dropzone.addEventListener(name, (event) => {
                        event.preventDefault()
                        dropzone.classList.remove('drag-over')
                    })
                })
            dropzone.addEventListener('drop', (event) => {
                const files = event.dataTransfer?.files
                uploadFiles(files).catch(() => null)
            })

            document.addEventListener('paste', (event) => {
                const files = pastedImageFiles(event)
                if (!files.length) return
                event.preventDefault()
                uploadFiles(files).catch(() => null)
            })

            qs('#items-list').addEventListener('click', (event) => {
                const target = event.target
                if (!(target instanceof HTMLElement)) return

                const openId = target.getAttribute('data-open')
                if (openId) {
                    state.mode = 'drive'
                    state.parentId = parseInt(openId, 10)
                    const folder = state.items.find((item) => item.drive_item_id === state.parentId)
                    state.crumbs = ['/ My Drive', folder?.display_name || `Folder ${openId}`]
                    loadItems().catch(() => null)
                    return
                }

                const renameId = target.getAttribute('data-rename')
                if (renameId) {
                    renameItem(parseInt(renameId, 10)).catch(() => null)
                    return
                }

                const deleteId = target.getAttribute('data-delete')
                if (deleteId) {
                    deleteItem(parseInt(deleteId, 10)).catch(() => null)
                    return
                }

                const downloadId = target.getAttribute('data-download')
                if (downloadId) {
                    downloadDriveItem(parseInt(downloadId, 10)).catch((err) => {
                        setStatus(err.message || 'Download failed', 'error')
                    })
                }
            })
        }

        async function bootstrap() {
            state.token = localStorage.getItem('d11_token') || ''
            if (!state.token) {
                location.href = '/'
                return
            }

            try {
                const meRes = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${state.token}` } })
                if (!meRes.ok) throw new Error('Unauthorized')
                state.user = await meRes.json()

                qs('#header-user-name').textContent = state.user.full_name || state.user.slug_prefix || 'User'
                window.LuminSuiteMenu.initMenu({
                    buttonId: 'btn-suite-menu',
                    menuId: 'suite-menu',
                    activePage: 'drive',
                    mode: 'light',
                })
                window.LuminSuiteMenu.setAdminAccess(state.user.is_admin === 1)

                bindEvents()
                await loadItems()
                setStatus('Drive ready')
            } catch {
                localStorage.removeItem('d11_token')
                location.href = '/'
            }
        }

        bootstrap().catch(() => null)
    </script>
</body>

</html>

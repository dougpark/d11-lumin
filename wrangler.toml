name = "d11-lumin"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database binding ────────────────────────────────────────────────────
# After running `bun run db:create`, paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "d11-db"
database_id = "394823da-d08b-496d-963d-298729aee84d"
migrations_dir = "migrations"

# ─── R2 Attachment storage ───────────────────────────────────────────────────
# Create bucket first, then set bucket_name (and preview_bucket_name if used).
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "d11-note-attachments"
preview_bucket_name = "d11-note-attachments-dev"

[[r2_buckets]]
binding = "FOOD_ENTRIES"
bucket_name = "d11-food-entries"
preview_bucket_name = "d11-food-entries-dev"

# ─── Workers AI binding ─────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Environment variables ───────────────────────────────────────────────────
# Set TOKEN_SECRET with: wrangler secret put TOKEN_SECRET
# (used to sign/verify API tokens – keep it out of source control)
# Set CF_ACCESS_CLIENT_ID and CF_ACCESS_CLIENT_SECRET with:
#   wrangler secret put CF_ACCESS_CLIENT_ID
#   wrangler secret put CF_ACCESS_CLIENT_SECRET
[vars]
ENVIRONMENT = "production"
# Model used for real-time bookmark enrichment (fast/cheap 1B model)
AI_BOOKMARK_MODEL = "@cf/meta/llama-3.2-1b-instruct"
# Ollama remote server URL (accessed via Cloudflare tunnel)
OLLAMA_URL = "https://ollama.d11.me/api/generate"

# ─── Custom domain routing ───────────────────────────────────────────────────
# Uncomment and fill in after adding d11.me to your Cloudflare account.
[[routes]]
pattern = "d11.me/*"
zone_name = "d11.me"

# ─── Module rules: import HTML files as raw text strings ─────────────────────
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# ─── Cron Triggers ──────────────────────────────────────────────────────────
[triggers]
crons = ["*/30 * * * *"]

# ─── Local dev overrides ─────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

[assets]
directory = "./public"